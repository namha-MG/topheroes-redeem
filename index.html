<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopHeroes Auto Redeem Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    
    <div class="app-wrapper">
        <header class="cyber-header">
            <h1 class="glitch-text" data-text="TOPHEROES">TOPHEROES</h1>
            <h2 class="sub-heading">AUTO REDEEM <span>SYSTEM</span></h2>
        </header>

        <div class="main-dashboard">
            <div class="input-section">
                <div class="input-card">
                    <div class="card-header">
                        <span class="icon">🆔</span>
                        <h3>PLAYER UIDS</h3>
                    </div>
                    <textarea id="uids" class="cyber-input" placeholder="Nhập mỗi UID một dòng...&#10;Ví dụ:&#10;996388907184"></textarea>
                </div>
                
                <div class="input-card">
                    <div class="card-header">
                        <span class="icon">🎁</span>
                        <h3>GIFT CODES</h3>
                    </div>
                    <textarea id="codes" class="cyber-input" placeholder="Nhập mỗi Code một dòng...&#10;Ví dụ:&#10;NEWYEAR2026"></textarea>
                </div>
            </div>

            <div class="action-section">
                <button id="startBtn" class="cyber-btn" onclick="startRedeem()">
                    <span class="btn-text">INITIALIZE REDEEM</span>
                </button>
            </div>

            <div class="terminal-section">
                <div class="terminal-header">
                    <div class="terminal-title">SYSTEM.LOGS</div>
                    <button class="clear-btn" onclick="clearLogs()">[ CLEAR ]</button>
                </div>
                <div id="logBox" class="terminal-body">
                    <div class="log-entry info"><span class="time">[SYS]</span> Terminal Ready. Chờ lệnh từ người dùng...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
